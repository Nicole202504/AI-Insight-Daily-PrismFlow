name: Generate AI Daily

on:
  workflow_dispatch:
  schedule:
    # 18:40 Asia/Shanghai, for testing
    - cron: "40 10 * * *"
    # 07:00 Asia/Shanghai
    - cron: "0 23 * * *"

permissions:
  contents: write

concurrency:
  group: daily-rss
  cancel-in-progress: false

env:
  TZ: Asia/Shanghai
  DAILY_AI_PROVIDER: openai
  OPENAI_API_URL: https://api.openai.com
  OPENAI_MODEL: gpt-4.1-mini
  APIMART_BASE_URL: https://api.apimart.ai/v1beta
  APIMART_MODEL: gemini-3.5-flash
  DAILY_SUMMARY_LIMIT: "80"
  DAILY_AI_CONCURRENCY: "4"
  DAILY_AI_TIMEOUT_MS: "45000"
  DAILY_ASSETS_DIR: daily-assets
  DAILY_IMAGE_PREFIX: /daily-assets

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate daily markdown
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          APIMART_API_KEY: ${{ secrets.APIMART_API_KEY }}
        run: |
          DATE=$(TZ=Asia/Shanghai date +%F)
          npm run daily:rss -- --date="$DATE" --max-age-days=3 --summary-limit="${DAILY_SUMMARY_LIMIT}" --summary-concurrency="${DAILY_AI_CONCURRENCY}" --summary-timeout-ms="${DAILY_AI_TIMEOUT_MS}"

      - name: Commit generated content
        run: |
          DATE=$(TZ=Asia/Shanghai date +%F)
          git config user.name "ai-daily-bot"
          git config user.email "actions@github.com"
          git add daily daily-assets
          git diff --cached --quiet || git commit -m "daily: update $DATE"
          git push
